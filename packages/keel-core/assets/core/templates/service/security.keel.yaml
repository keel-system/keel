# Capa security — autenticación y autorización.
# Las reglas se declaran por operación (nombre estable), no por ruta.
# Agnóstico de proveedor: oidc/jwt/api-key; el servidor concreto (Keycloak, Auth0...) se decide al generar.
# Recuerda declarar la capa en service.keel.yaml → layers.security.

authentication:
  protocol: oidc          # oidc | jwt | api-key | none
  tokenLocation: header
  # serviceAuth declara cómo se autentican los clientes máquina (endpoints audience services/both):
  # serviceAuth:
  #   protocol: client-credentials   # client-credentials | api-key
  #   validateAudience: true         # exige que el claim aud del token incluya esta audiencia
  #   audience: product-service      # opcional; por defecto, el nombre del servicio

# roles:
#   catalog-admin:  { description: Gestiona el catálogo completo. }
#   catalog-reader: { description: Solo consulta el catálogo. }

# permissions:
#   product:write: { description: Crear y mutar productos. }
#   product:read:  { description: Leer productos. }

# roleGrants:
#   catalog-admin: [product:write, product:read]
#   catalog-reader: [product:read]

# serviceClients cataloga los servicios consumidores (clientes máquina) y sus scopes
# (los scopes reutilizan el catálogo permissions; mínimo privilegio por cliente):
# serviceClients:
#   billing-service: { description: Consulta precios para facturar., scopes: [product:read] }

access:
  # Regla por defecto para toda operación sin regla explícita.
  default: { level: required }
  # rules:
  #   createProduct:   { level: required, permissions: [product:write] }
  #   getProduct:      { level: public }
  #   # level service protege endpoints audience services; scopes exigidos a los clientes máquina:
  #   getProductPrice: { level: service, scopes: [product:read] }
