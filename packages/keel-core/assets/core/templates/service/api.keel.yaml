# Capa api — integración con el cliente: exposición REST de las operaciones.
# La seguridad de estos endpoints se declara en security.keel.yaml, no aquí.
# Recuerda declarar la capa en service.keel.yaml → layers.api.

style: rest
basePath: /api/v1

# auto: true deriva rutas por convención CRUD desde las operaciones.
auto: true

# defaultAudience fija el público de los endpoints sin audience propia (incluidos los de auto):
# defaultAudience: users    # users | services | both

# endpoints declara el mapeo explícito (tiene prioridad sobre auto) para rutas no CRUD:
# audience marca a quién sirve el endpoint: users (web/mobile), services (otros servidores, M2M) o both.
# endpoints:
#   retireProduct:   { method: POST, path: "/products/{id}/retire", successStatus: 200 }
#   getProductPrice: { method: GET, path: "/products/{id}/price", audience: services }

# pagination:
#   style: offset
#   defaultSize: 20
#   maxSize: 100
