# Capa storage — almacenamiento de archivos (object storage).
# Agnóstico del proveedor: se declaran buckets lógicos y sus políticas, no S3/MinIO/GCS.
# El proveedor concreto se decide al generar. Recuerda declarar la capa en service.keel.yaml → layers.storage.
#
# Los campos de tipo file (en domain) referencian un bucket por nombre:
#   photo: { type: file, bucket: productImages }

